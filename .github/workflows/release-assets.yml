name: Release Assets

on:
  push:
    branches:
      - 'pre-release'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package
        run: pnpm test

      - name: Build release assets
        run: pnpm build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fseconomy-tools-release-assets
          path: |
            dist/bundle.js
            dist/fseconomy-tools.user.js

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/bundle.js dist/fseconomy-tools.user.js --clobber
